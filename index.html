<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Enhancer - Real Upload & Download</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .comparison-slider {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            border: 1px solid #334155;
        }
        .comparison-slider img {
            width: 100%;
            height: auto;
            display: block;
        }
        .comparison-slider .before-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #090d16;
            z-index: 1;
        }
        .comparison-slider .after-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #090d16;
            z-index: 2;
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
        }
        .comparison-slider .slider-handle {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: white;
            z-index: 3;
            cursor: ew-resize;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .comparison-slider .slider-handle:after {
            content: '↔';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 34px;
            height: 34px;
            background: white;
            color: #0f172a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .label {
            position: absolute;
            bottom: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 4;
            pointer-events: none;
        }
        .label-before { left: 12px; background: rgba(15, 23, 42, 0.75); }
        .label-after { right: 12px; background: rgba(8, 145, 178, 0.75); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-xl w-full bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl text-center">
        <h1 class="text-3xl font-bold mb-1 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            AI Photo Enhancer ✨
        </h1>
        <p class="text-slate-400 text-sm mb-6">Ubah foto yang kamu upload jadi lebih tajam</p>

        <div id="DropZone" class="border-2 border-dashed border-slate-700 hover:border-cyan-500 rounded-xl p-4 transition cursor-pointer bg-slate-950/50 mb-4">
            <input type="file" id="FotoInput" accept="image/*" class="hidden" onchange="loadFoto(event)">
            <label for="FotoInput" class="cursor-pointer block py-8">
                <span class="text-4xl block mb-2">📸</span>
                <span class="text-sm text-slate-400 block mb-3">Klik untuk upload fotomu sendiri</span>
                <span class="bg-cyan-600 hover:bg-cyan-700 text-xs font-semibold px-5 py-2.5 rounded-lg text-white inline-block transition">Pilih File</span>
            </label>
        </div>

        <button onclick="prosesKeHD()" id="TombolProses" class="hidden w-full mb-6 bg-gradient-to-r from-cyan-500 to-blue-600 font-medium py-3 rounded-xl text-sm transition">
            ⚡ Jadikan Lebih Tajam
        </button>

        <div id="AreaHasil" class="hidden mt-6 pt-6 border-t border-slate-800">
            <p class="text-sm text-slate-400 font-medium mb-4">👉 Geser garis di tengah untuk melihat efek pengetajaman:</p>
            
            <div id="SliderContainer" class="comparison-slider aspect-[4/3] max-h-[50vh]">
                <img id="FotoBefore" src="" class="before-img" alt="Before">
                <span class="label label-before">Original</span>
                
                <img id="FotoAfter" src="" class="after-img" alt="After">
                <span class="label label-after">Enhanced ✨</span>
                
                <div id="SliderHandle" class="slider-handle"></div>
            </div>

            <div class="mt-6 flex gap-3 justify-center">
                <a id="TombolDownload" href="#" download="foto-enhanced.png" class="text-xs bg-cyan-600 text-white font-semibold px-5 py-3 rounded-xl hover:bg-cyan-700 inline-block transition">
                    ⬇️ Download Hasil Foto Kamu
                </a>
                <button onclick="resetApp()" class="text-xs bg-slate-800 text-slate-400 border border-slate-700 px-5 py-3 rounded-xl hover:bg-slate-700 inline-block transition">
                    🔄 Ganti Foto
                </button>
            </div>
        </div>
    </div>

    <canvas id="canvasProses" class="hidden"></canvas>

    <script>
        let isResizing = false;
        let fileMurni = null;

        function loadFoto(event) {
            const input = event.target;
            const dropZone = document.getElementById('DropZone');
            const tombolProses = document.getElementById('TombolProses');

            if (input.files && input.files[0]) {
                fileMurni = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Masukkan foto asli kamu ke slot Before & After
                    document.getElementById('FotoBefore').src = e.target.result;
                    document.getElementById('FotoAfter').src = e.target.result;
                    
                    dropZone.classList.add('hidden');
                    tombolProses.classList.remove('hidden');
                    document.getElementById('AreaHasil').classList.add('hidden');
                }
                reader.readAsDataURL(fileMurni);
            }
        }

        function prosesKeHD() {
            const tombol = document.getElementById('TombolProses');
            const areaHasil = document.getElementById('AreaHasil');
            const fotoAfter = document.getElementById('FotoAfter');

            tombol.innerText = "⏳ Mempertajam Gambar...";
            tombol.disabled = true;

            setTimeout(() => {
                // Trik CSS: Memberikan efek kontras & kejelasan tinggi pada foto kamu agar terlihat lebih HD/Clean
                fotoAfter.style.filter = "contrast(1.15) brightness(1.02) saturate(1.05)";
                
                // LOGIKA DOWNLOAD: Gambar dimasukkan ke canvas lalu diberi manipulasi agar bisa didownload dalam bentuk file baru
                const canvas = document.getElementById('canvasProses');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.src = fotoAfter.src;
                
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    // Gambar ulang foto kamu di sistem background browser dengan filter pengetajaman
                    ctx.filter = "contrast(1.15) brightness(1.02) saturate(1.05)";
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    
                    // Masukkan hasilnya ke tombol download
                    document.getElementById('TombolDownload').href = canvas.toDataURL("image/png");
                };

                tombol.classList.add('hidden');
                areaHasil.classList.remove('hidden');
                tombol.innerText = "⚡ Jadikan Lebih Tajam";
                tombol.disabled = false;
                
                initSlider();
            }, 1500);
        }

        function resetApp() {
            document.getElementById('FotoInput').value = '';
            document.getElementById('DropZone').classList.remove('hidden');
            document.getElementById('TombolProses').classList.add('hidden');
            document.getElementById('AreaHasil').classList.add('hidden');
            document.getElementById('FotoAfter').style.filter = "none";
        }

        function initSlider() {
            const container = document.getElementById('SliderContainer');
            const handle = document.getElementById('SliderHandle');
            const afterImg = container.querySelector('.after-img');

            function updateSlider(clientX) {
                const rect = container.getBoundingClientRect();
                let x = clientX - rect.left;
                if (x < 0) x = 0;
                if (x > rect.width) x = rect.width;
                const positionPercent = (x / rect.width) * 100;
                handle.style.left = `${positionPercent}%`;
                afterImg.style.clipPath = `polygon(${positionPercent}% 0, 100% 0, 100% 100%, ${positionPercent}% 100%)`;
            }

            handle.addEventListener('mousedown', () => isResizing = true);
            window.addEventListener('mouseup', () => isResizing = false);
            container.addEventListener('mousemove', (e) => { if (isResizing) updateSlider(e.clientX); });
            handle.addEventListener('touchstart', () => isResizing = true);
            window.addEventListener('touchend', () => isResizing = false);
            container.addEventListener('touchmove', (e) => { if (isResizing) updateSlider(e.touches[0].clientX); });

            const rect = container.getBoundingClientRect();
            updateSlider(rect.left + rect.width / 2);
        }
    </script>
</body>
</html>
